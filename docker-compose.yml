services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kaima_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kaima-network
  db:
    image: postgres:18
    restart: always
    volumes:
      - kaima-db-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - kaima-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d kaima_database"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  

  redis:
    image: redis
    volumes:
      - kaima-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - kaima-network

networks:
  kaima-network:

volumes:
  kaima-db-data:
  kaima-redis-data:
  
  